name: Generate legal PDFs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "legal/*.md"   # only run when markdown policies change
      - "titlepage.tex"
      - "section-breaks.tex"

concurrency:
  group: legal-pdfs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-xetex

      - name: Generate PDFs from Markdown
        run: |
          rm -rf legal-pdf
          mkdir -p legal-pdf
          for file in legal/*.md; do
            base="$(basename "$file" .md)"
            echo "Converting $file -> legal-pdf/${base}.pdf"
            pandoc "$file" \
              -o "legal-pdf/${base}.pdf" \
              --from markdown \
              --toc \
              --number-sections \
              --pdf-engine=xelatex \
              --include-before-body=titlepage.tex \
              --include-in-header=section-breaks.tex
          done

      - name: Commit and push updated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated legal PDFs"
          branch: ${{ github.head_ref }}
          file_pattern: legal-pdf
          add_options: "-A"
